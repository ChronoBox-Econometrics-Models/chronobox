<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle (clock face) -->
  <circle cx="60" cy="60" r="54" fill="#009688" opacity="0.1" stroke="#009688" stroke-width="3"/>

  <!-- Clock tick marks -->
  <line x1="60" y1="10" x2="60" y2="18" stroke="#009688" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="102" x2="60" y2="110" stroke="#009688" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="60" x2="18" y2="60" stroke="#009688" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="102" y1="60" x2="110" y2="60" stroke="#009688" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Time series line inside the clock -->
  <polyline
    points="20,70 32,65 40,72 48,55 56,58 64,42 72,48 80,35 88,40 100,30"
    fill="none"
    stroke="#009688"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Clock center dot -->
  <circle cx="60" cy="60" r="4" fill="#009688"/>

  <!-- Clock hands (hour and minute) -->
  <line x1="60" y1="60" x2="60" y2="30" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="82" y2="52" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
